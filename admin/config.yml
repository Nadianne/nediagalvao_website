local_backend: true

backend:
name: git-gateway
branch: refactor-blog-local

publish_mode: editorial_workflow

site_url: https://nediagalvao.com.br
display_url: https://nediagalvao.com.br

locale: pt

media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"

collections:
  - name: "artigos_escritos"
    label: "✍️ Artigos"
    folder: "_conteudos"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "conteudos/{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "conteudo" }
      - { label: "Tipo", name: "tipo", widget: "hidden", default: "artigo" }

      - label: "Título do artigo"
        name: "title"
        widget: "string"

      - label: "Endereço da página"
        name: "slug"
        widget: "string"
        hint: "Ex: maes-cristas-nao-sao-marionetes"

      - label: "Onde aparece?"
        name: "secao"
        widget: "select"
        options:
          - { label: "Artigos", value: "artigos" }
          - { label: "Resenhas", value: "resenhas" }

      - label: "Data"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD/MM/YYYY"
        time_format: false

      - label: "Resumo para o card"
        name: "description"
        widget: "text"

      - label: "Imagem do card"
        name: "image"
        widget: "image"
        required: false

      - label: "Origem/Publicação"
        name: "origem"
        widget: "string"
        required: false

      - label: "Destacar?"
        name: "destaque"
        widget: "boolean"
        default: false

      - label: "Modelo visual do artigo"
        name: "modelo_artigo"
        widget: "select"
        default: "simples"
        options:
          - { label: "Texto simples", value: "simples" }
          - { label: "Imagem no topo + texto", value: "imagem_topo" }
          - { label: "Imagem lateral + texto", value: "imagem_lateral" }
          - { label: "Texto em colunas", value: "colunas" }
        hint: "Escolha como o artigo será exibido na página."

      - label: "Texto do artigo"
        name: "body"
        widget: "markdown"

  - name: "publicacoes_pdf"
    label: "📎 Publicações em PDF"
    folder: "_conteudos"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "conteudos/{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "conteudo" }
      - { label: "Tipo", name: "tipo", widget: "hidden", default: "pdf" }

      - label: "Título"
        name: "title"
        widget: "string"

      - label: "Endereço da página"
        name: "slug"
        widget: "string"

      - label: "Onde aparece?"
        name: "secao"
        widget: "select"
        options:
          - { label: "Artigos", value: "artigos" }
          - { label: "Resenhas", value: "resenhas" }
          - { label: "Livros", value: "livros" }
          - { label: "Revistas EBD", value: "revistas" }

      - label: "Arquivo PDF"
        name: "pdf"
        widget: "file"
        media_folder: "/assets/pdfs/uploads"
        public_folder: "/assets/pdfs/uploads"
        required: false
        media_library:
          config:
            multiple: false

      - label: "Imagem do card"
        name: "image"
        widget: "image"
        required: false
        media_library:
          config:
            multiple: false

      - label: "Resumo para o card"
        name: "description"
        widget: "text"

      - label: "Origem/Publicação"
        name: "origem"
        widget: "string"
        required: false

      - label: "Data"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD/MM/YYYY"
        time_format: false

      - label: "Destacar?"
        name: "destaque"
        widget: "boolean"
        default: false

      - label: "Descrição da página"
        name: "body"
        widget: "markdown"
        required: false

  - name: "videos_youtube"
    label: "🎥 Vídeos do YouTube"
    folder: "_conteudos"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    preview_path: "conteudos/{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "conteudo" }
      - { label: "Tipo", name: "tipo", widget: "hidden", default: "video" }
      - { label: "Seção", name: "secao", widget: "hidden", default: "videos" }

      - label: "Título do vídeo"
        name: "title"
        widget: "string"

      - label: "Endereço da página"
        name: "slug"
        widget: "string"

      - label: "Link do YouTube"
        name: "youtube_url"
        widget: "string"

      - label: "ID do vídeo"
        name: "youtube_id"
        widget: "string"
        hint: "Ex: c_dtB3ze4Rg"

      - label: "Imagem manual do card"
        name: "image"
        widget: "image"
        required: false
        media_library:
          config:
            multiple: false

      - label: "Resumo para o card"
        name: "description"
        widget: "text"

      - label: "Data"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD/MM/YYYY"
        time_format: false

      - label: "Destacar?"
        name: "destaque"
        widget: "boolean"
        default: false

